trigger:
- none

pr:
# NOTE: "npm-package" -> "master" after merge
- npm-package

steps:
# Shallow checkout is sufficient for BV and avoids persisting credentials.
- checkout: self
  fetchDepth: 1
  sparseCheckoutDirectories: packages/docker4gis-cli
  displayName: Git checkout

# Build the package image.
- bash: |
    ./build.sh
  displayName: 'build package image'
  workingDirectory: packages/docker4gis-cli/base/package
