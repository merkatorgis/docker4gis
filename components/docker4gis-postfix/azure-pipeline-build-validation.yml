trigger:
- none

pr:
- npm-package

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self
  fetchDepth: 1
  sparseCheckoutDirectories: components/docker4gis-postfix
  displayName: 'git checkout'

- script: |
    npx --yes docker4gis@latest build
  displayName: 'docker4gis build'
  workingDirectory: components/docker4gis-postfix
